kind = "web"
previewPath = "/"
title = "Memory Bridge"
version = "1.0.0"
id = "artifacts/memory-bridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23465

[services.development]
run = "pnpm --filter @workspace/memory-bridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/memory-bridge", "run", "build" ]
publicDir = "artifacts/memory-bridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23465"
BASE_PATH = "/"
